name: Code Quality

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore tools
        run: |
          dotnet new tool-manifest --force
          dotnet tool install dotnet-format --local

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity detailed
        continue-on-error: true

  static-analysis:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build with analyzers
        run: dotnet build --configuration Release --verbosity normal /p:TreatWarningsAsErrors=false

      - name: Run Roslyn analyzers
        run: |
          dotnet build --configuration Release /p:RunAnalyzersDuringBuild=true /p:TreatWarningsAsErrors=false 2>&1 | tee analysis.log
        continue-on-error: true

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-results
          path: analysis.log
          retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run security audit
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee security-audit.log

      - name: Upload security audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: security-audit.log
          retention-days: 30
