name: Release

on:
  push:
    branches: [master]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.props"
      - "**.axaml"
      - ".github/workflows/release-please.yml"
      - "installer/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win-x64
            asset_name: LocalMusicPlayer-win-x64.zip
            setup_arch: x64
            setup_target: win-x64
          - os: ubuntu-latest
            target: linux-x64
            asset_name: LocalMusicPlayer-linux-x64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install dependencies
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get update && sudo apt-get install -y libvlc-dev vlc

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.target }} --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/${{ matrix.target }}

      - name: Build Windows Installer
        if: ${{ runner.os == 'Windows' }}
        run: |
          New-Item -ItemType Directory -Force -Path installer\installer-output | Out-Null
          choco install innosetup -y
          $version = "${{ needs.release-please.outputs.tag_name }}".Replace('v', '')
          Set-Location installer
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version /DMyAppArch=${{ matrix.setup_arch }} /DMyAppTarget=${{ matrix.setup_target }} LocalMusicPlayer.iss
          Set-Location ..

      - name: Package
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cd ./publish/${{ matrix.target }}
            Compress-Archive -Path * -DestinationPath ../../${{ matrix.asset_name }}
          else
            cd ./publish/${{ matrix.target }}
            tar -czf ../../${{ matrix.asset_name }} .
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ./${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
