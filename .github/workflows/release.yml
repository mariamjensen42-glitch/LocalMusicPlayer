name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_NAME: 'LocalMusicPlayer'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish Windows x64
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/win-x64

      - name: Publish Windows x86
        run: |
          dotnet publish -c Release -r win-x86 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/win-x86

      - name: Create Windows archives
        run: |
          Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./publish/${{ env.PROJECT_NAME }}-win-x64.zip
          Compress-Archive -Path ./publish/win-x86/* -DestinationPath ./publish/${{ env.PROJECT_NAME }}-win-x86.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: ./publish/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev vlc

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish Linux x64
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o ./publish/linux-x64

      - name: Create Linux archive
        run: |
          cd ./publish/linux-x64
          tar -czf ../${{ env.PROJECT_NAME }}-linux-x64.tar.gz .
          cd ../..

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: ./publish/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies
        run: |
          brew install vlc

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish macOS x64
        run: |
          dotnet publish -c Release -r osx-x64 --self-contained true /p:PublishSingleFile=true -o ./publish/osx-x64

      - name: Publish macOS arm64
        run: |
          dotnet publish -c Release -r osx-arm64 --self-contained true /p:PublishSingleFile=true -o ./publish/osx-arm64

      - name: Create macOS archives
        run: |
          cd ./publish/osx-x64
          tar -czf ../${{ env.PROJECT_NAME }}-osx-x64.tar.gz .
          cd ../osx-arm64
          tar -czf ../${{ env.PROJECT_NAME }}-osx-arm64.tar.gz .
          cd ../..

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: ./publish/*.tar.gz

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
